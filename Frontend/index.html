<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Dados</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; margin: 10px; }
        table { margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Analisador de Dados CSV</h1>
        <p>Clique abaixo para ver os dados do arquivo:</p>
        
        <form action="/estatisticas" method="get">
            <button type="submit">Ver Estatísticas</button>
        </form>

        {% if tabelas %}
            <h2>Resumo Estatístico:</h2>
            {{ tabelas|safe }}
        {% endif %}
    </div>
</body>
</html>
